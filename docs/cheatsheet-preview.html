  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050508; font-family: 'Aeonik', sans-serif; color: #fff; min-height: 100vh; }

  /* ── Dev Toolbar ── */
  .dev-toolbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,10,16,0.97); backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 12px 20px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .toolbar-group {
    display: flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px; padding: 4px 5px;
  }
  .toolbar-group label {
    font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.25); letter-spacing: 1.2px;
    text-transform: uppercase; padding: 0 6px; white-space: nowrap;
  }
  .toolbar-sep { width: 1px; height: 28px; background: rgba(255,255,255,0.06); margin: 0 4px; flex-shrink: 0; }
  .format-btn, .mode-btn, .book-btn {
    padding: 6px 14px; border-radius: 7px; border: 1px solid transparent;
    background: transparent; color: rgba(255,255,255,0.45);
    font-size: 11px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s;
  }
  .format-btn:hover, .mode-btn:hover, .book-btn:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }
  .format-btn.active, .mode-btn.active, .book-btn.active {
    background: rgba(0,215,215,0.12); border-color: rgba(0,215,215,0.3); color: #00d7d7; font-weight: 700;
  }
  .page-btn {
    padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(0,215,215,0.2);
    background: transparent; color: #00d7d7;
    font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.15s;
  }
  .page-btn:hover { background: rgba(0,215,215,0.1); }
  .page-btn:disabled { opacity: 0.25; cursor: default; }

  /* EdgeBoard header — subtle red accent */
  .header.edge-header {
    background: linear-gradient(135deg, rgba(239,68,68,0.10) 0%, rgba(239,68,68,0.02) 100%);
    border-bottom: 1px solid rgba(239,68,68,0.12);
  }
  .header.edge-header .header-title span { color: #ef4444; }

  /* Alt mode header accent — slightly different green tint */
  .header.alt-header {
    background: linear-gradient(135deg, rgba(34,197,94,0.10) 0%, rgba(34,197,94,0.02) 100%);
    border-bottom: 1px solid rgba(34,197,94,0.12);
  }
  .header.alt-header .header-title span { color: #22c55e; }

  /* Goblin odds cell — big negative number */
  .goblin-odds { font-weight: 900; color: #22c55e; line-height: 1.15; }
  .dim-label { font-size: 10px; color: rgba(255,255,255,0.18); font-weight: 500; margin-left: 6px; font-family: monospace; }
  .discord-hint { font-size: 10px; color: rgba(255,255,255,0.2); margin-left: auto; font-family: monospace; }
  body.production .dev-toolbar { display: none; }

  .canvas-area { display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px 80px; }
  body.production .canvas-area { padding: 0; }

  /* ── Cheatsheet Canvas ── */
  .cheatsheet {
    background: linear-gradient(180deg, #080a10 0%, #050508 100%);
    overflow: hidden; display: flex; flex-direction: column;
    border: 1px solid rgba(0,215,215,0.12);
    box-shadow: 0 0 60px rgba(0,215,215,0.06);
  }
  body.production .cheatsheet { border-radius: 0; border: none; box-shadow: none; }
  body:not(.production) .cheatsheet { border-radius: 0; }

  /* ── Header (horizontal layout) ── */
  .header {
    background: linear-gradient(135deg, rgba(0,215,215,0.08) 0%, rgba(0,215,215,0.02) 100%);
    border-bottom: 1px solid rgba(0,215,215,0.10);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; flex: 1; }
  .header-logo-icon { object-fit: contain; }
  .header-logo-text { font-weight: 300; color: rgba(255,255,255,0.85); letter-spacing: -0.5px; }
  .header-subtitle { color: rgba(255,255,255,0.30); font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
  .header-center { display: flex; flex-direction: column; align-items: center; flex: 1; justify-content: center; }
  .header-title { font-weight: 900; color: #fff; letter-spacing: 1px; text-transform: uppercase; }
  .header-title span { color: #00d7d7; }
  .header-date { color: rgba(255,255,255,0.35); font-weight: 500; letter-spacing: 1.5px; }
  .header-right { display: flex; align-items: center; flex: 1; justify-content: flex-end; }

  /* ── Column Headers ── */
  .col-headers {
    display: grid; background: rgba(255,255,255,0.025);
    border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
  }
  .col-headers span {
    font-weight: 700; color: rgba(255,255,255,0.35); letter-spacing: 1.5px;
    text-transform: uppercase; display: flex; align-items: center; justify-content: center;
  }
  .col-headers span:first-child { justify-content: flex-start; padding-left: 8px; }

  /* ── Rows ── */
  .rows { flex: 1; display: flex; flex-direction: column; }
  .row {
    display: grid; align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    position: relative;
  }
  .row:nth-child(even) { background: rgba(255,255,255,0.015); }
  .row:last-child { border-bottom: none; }
  .row.five-star { background: rgba(34,197,94,0.04); }

  /* Team color accent bar on left */
  .team-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .row.five-star .team-accent { background: rgba(34,197,94,0.7) !important; }

  /* ── Player Cell ── */
  .player-cell { display: flex; align-items: center; min-width: 0; position: relative; overflow: hidden; align-self: stretch; }
  .player-avatar {
    border-radius: 12%; background-color: transparent;
    border: none; overflow: hidden; flex-shrink: 0;
    background-size: contain; background-position: center bottom; background-repeat: no-repeat;
  }
  .player-name-block { display: flex; flex-direction: column; min-width: 0; }
  .player-first { font-weight: 700; color: rgba(255,255,255,0.50); text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.1; }
  .player-last { font-weight: 900; color: #fff; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.15; }

  /* ── Pick Cell ── */
  .pick-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .pick-line { font-weight: 800; color: #fff; line-height: 1.15; white-space: nowrap; }
  .pick-stat { font-weight: 600; color: rgba(255,255,255,0.30); text-transform: uppercase; line-height: 1.3; }
  .pick-dir { font-weight: 700; }
  .pick-dir.over { color: #22c55e; }
  .pick-dir.under { color: #f97316; }

  /* ── Data Cells ── */
  .data-cell { display: flex; align-items: center; justify-content: center; font-variant-numeric: tabular-nums; }
  .stacked-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; font-variant-numeric: tabular-nums; }
  .avg-val { font-weight: 700; color: rgba(255,255,255,0.55); }
  .odds-val { font-weight: 700; color: rgba(255,255,255,0.45); line-height: 1.15; }
  .bk-label { font-weight: 700; color: rgba(255,255,255,0.20); text-transform: uppercase; line-height: 1.2; }

  .stat-val { font-weight: 800; }
  .stat-val.green { color: #22c55e; }
  .stat-val.yellow { color: #eab308; }
  .stat-val.red { color: #ef4444; }

  .trend-val { font-weight: 800; }
  .trend-val.up { color: #22c55e; }
  .trend-val.flat { color: rgba(255,255,255,0.30); }
  .trend-val.down { color: #ef4444; }

  /* ── Team Badge (reusable: DEF cell, odds cell, etc.) ── */
  .team-badge { display: flex; align-items: center; gap: 4px; }
  .team-badge-logo {
    flex-shrink: 0; object-fit: contain;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
  }
  .def-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; }
  .def-rank { font-weight: 900; line-height: 1.15; }
  .def-rank.green { color: #22c55e; }
  .def-rank.yellow { color: #eab308; }
  .def-rank.red { color: #ef4444; }
  .def-context { font-weight: 600; color: rgba(255,255,255,0.25); line-height: 1.2; text-transform: uppercase; }

  /* ── Player Cell Team Branding ── */
  .player-team-watermark {
    position: absolute; pointer-events: none;
    opacity: 0.20;
  }

  /* ── Bookmaker Logo ── */
  .book-col-header {
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .book-col-header img { object-fit: contain; border-radius: 3px; }
</style>
</head>

function bookLogoHTML(bk, sizePx) {
  if (!bk) return '';
  const url = BOOK_LOGO_B64[bk];
  if (!url) return `<span class="bk-label" style="font-size:${Math.round(sizePx*0.6)}px;color:rgba(255,255,255,0.5)">${bk}</span>`;
  return `<img src="${url}" alt="${bk}" style="height:${sizePx}px;width:auto;border-radius:4px;">`;
}

// 2) External images (headshots, team logos): fetched as blobs → base64 at init.
async function cacheImage(url) {
  if (!url || IMAGE_CACHE[url]) return IMAGE_CACHE[url];
  try {
    const resp = await fetch(url);
    const blob = await resp.blob();
    const b64 = await new Promise((resolve) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.onerror = () => resolve(null);
      reader.readAsDataURL(blob);
    });
    if (b64) IMAGE_CACHE[url] = b64;
    return b64;
  } catch {
    return null;
  }
}
function cachedUrl(url) { return IMAGE_CACHE[url] || url; }

// Pre-cache ALL images: book logos (local), headshots + team logos (ESPN CDN)
async function prefetchAllImages() {
  const urls = new Set();
  // Player headshots + team logos (book logos are already inline base64)
  [...PROPS, ...ALT_PROPS].forEach(pr => {
    if (pr.headshotUrl) urls.add(pr.headshotUrl);
    if (pr.teamCode) urls.add(teamLogoUrl(pr.teamCode));
    if (pr.defTeam) urls.add(teamLogoUrl(pr.defTeam));
  });
  await Promise.all([...urls].map(u => cacheImage(u)));
  console.log(`[Cache] ${Object.keys(IMAGE_CACHE).length} images cached as base64`);
}

// ── Live data (fetched from getCheatsheetData endpoint) ──
let PROPS = [];
let ALT_PROPS = [];
let GAMES_META = []; // game metadata for dynamic date
const API_BASE = 'https://us-central1-betai-f9176.cloudfunctions.net';

// Variant pagination: which page of data we're showing
let currentPage = 0;

async function fetchCheatsheetData() {
  try {
    const resp = await fetch(`${API_BASE}/getCheatsheetData`);
    const data = await resp.json();
    if (!data.success) throw new Error(data.error || 'Fetch failed');
    PROPS = data.edge || [];
    ALT_PROPS = data.stack || [];
    GAMES_META = data.games || [];
    console.log(`[Data] Loaded ${PROPS.length} edge, ${ALT_PROPS.length} stack from ${GAMES_META.length} games`);
    // Debug: log bookmaker keys
    const edgeBks = [...new Set(PROPS.map(p => p.bk))];
    const stackBks = [...new Set(ALT_PROPS.map(p => p.bk))];
    console.log(`[Data] Edge bookmakers:`, edgeBks);
    console.log(`[Data] Stack bookmakers:`, stackBks);
    return data;
  } catch (err) {
    console.error('[Data] Fetch failed:', err);
    return null;
  }
}

function hitColor(pct, dir) {
  if (pct == null) return 'yellow';
  if (dir === 'over')  return pct >= 60 ? 'green' : pct >= 45 ? 'yellow' : 'red';
  return pct <= 40 ? 'green' : pct <= 55 ? 'yellow' : 'red';
}
function defColor(rank, dir) {
  if (rank == null) return 'yellow';
  if (dir === 'over')  return rank >= 21 ? 'green' : rank >= 11 ? 'yellow' : 'red';
  return rank <= 10 ? 'green' : rank <= 20 ? 'yellow' : 'red';
}
function trendColor(val) { return val > 0.5 ? 'up' : val < -0.5 ? 'down' : 'flat'; }
function trendLabel(val) { return (val > 0 ? '+' : '') + val.toFixed(1); }
function p(v) { return Math.round(v) + 'px'; }

function getCheatsheetDate() {
  // Always use local date (today) — game times are UTC and can shift the day
  const d = new Date();
  const days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  return `${days[d.getDay()]}, ${d.getDate()}/${d.getMonth() + 1} · NBA`;
}

function shortStat(stat) {
  const map = {
    'POINTS': 'PTS', 'REBOUNDS': 'REB', 'ASSISTS': 'AST', '3PT MADE': '3PM',
    'PTS+REB': 'P+R', 'PTS+AST': 'P+A', 'PTS+REB+AST': 'PRA',
    'REB+AST': 'R+A', 'STEALS': 'STL', 'BLOCKS': 'BLK',
  };
  return map[stat] || stat;
}

// ── Refresh Props (lightweight, pipeline-aware) ──
// Step 1: Run pipeline to generate fresh data in Firestore
// Step 2: Re-fetch cheatsheet data from cache
// Step 3: Re-render with new data
async function refreshCache() {
  const btn = document.getElementById('refreshBtn');
  // Always run both pipelines — cheatsheet needs both EdgeBoard + Parlay Stack
  const pipeline = 'both';
  btn.textContent = 'GENERATING...';
  btn.style.opacity = '0.5';
  btn.disabled = true;
  const t0 = Date.now();
  try {
    // Step 1: Refresh the pipeline data in Firestore
    const resp = await fetch(`${API_BASE}/refreshProps`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pipeline })
    });
    const data = await resp.json();
    const sec = ((Date.now() - t0) / 1000).toFixed(0);
    console.log('[Refresh]', data);

    // Step 2: Re-fetch fresh cheatsheet data + re-cache images
    btn.textContent = `LOADING DATA...`;
    await fetchCheatsheetData();
    await prefetchAllImages();
    buildBookButtons();

    // Step 3: Re-render
    render(currentFormat, currentMode);

    btn.textContent = `DONE · ${data.updated} games · ${sec}s`;
    btn.style.borderColor = '#22c55e';
    setTimeout(() => { resetRefreshBtn(); }, 5000);
  } catch (err) {
    btn.textContent = 'ERROR';
    btn.style.borderColor = '#ef4444'; btn.style.color = '#ef4444';
    console.error('[Refresh]', err);
    setTimeout(() => { resetRefreshBtn(); }, 3000);
  }
}
function resetRefreshBtn() {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = 'REFRESH';
  btn.style.opacity = '1'; btn.disabled = false;
  btn.style.borderColor = 'rgba(34,197,94,0.3)'; btn.style.color = '#22c55e';
}

// ── Download as PNG ──
// 1. Temporarily re-render at full resolution (S=1)
// 2. Capture at 1:1 with dom-to-image — no transforms, no scaling, no hacks
// 3. Restore preview (S=0.5)
async function downloadCheatsheet() {
  const btn = document.getElementById('downloadBtn');
  btn.textContent = 'RENDERING FULL RES...';
  btn.style.opacity = '0.5';
  btn.disabled = true;

  const prevS = S;
  try {
    // Step 1: Re-render at full resolution
    S = 1;
    render(currentFormat, currentMode);

    // Step 2: Wait for all images to fully load at new size
    const el = document.getElementById('cheatsheet');
    const imgs = [...el.querySelectorAll('img')];
    await Promise.all(imgs.map(img =>
      img.complete ? Promise.resolve() : new Promise(r => { img.onload = r; img.onerror = r; })
    ));
    await new Promise(r => setTimeout(r, 200)); // let browser paint

    // Step 3: Capture at Retina resolution for crisp output
    btn.textContent = 'CAPTURING...';
    const dpr = window.devicePixelRatio || 1;
    const dataUrl = await domtoimage.toPng(el, {
      bgcolor: '#050508',
      width: el.scrollWidth * dpr,
      height: el.scrollHeight * dpr,
      style: {
        transform: `scale(${dpr})`,
        transformOrigin: 'top left',
      },
    });

    // Step 4: Download
    const link = document.createElement('a');
    const mode = currentMode === 'stack' ? 'parlay-stack' : 'edgeboard';
    const today = new Date().toISOString().slice(0, 10);
    link.download = `betai-${mode}-${currentFormat}-${today}-p${currentPage + 1}.png`;
    link.href = dataUrl;
    link.click();
    btn.textContent = 'SAVED!';
    setTimeout(() => { btn.textContent = 'DOWNLOAD'; btn.style.opacity = '1'; btn.disabled = false; }, 2000);
  } catch (err) {
    console.error('[Download]', err);
    btn.textContent = 'ERROR';
    btn.style.borderColor = '#ef4444'; btn.style.color = '#ef4444';
    setTimeout(() => { btn.textContent = 'DOWNLOAD'; btn.style.opacity = '1'; btn.disabled = false; btn.style.borderColor = 'rgba(0,215,215,0.25)'; btn.style.color = '#00d7d7'; }, 3000);
  } finally {
    // Step 5: Always restore preview
    S = prevS;
    render(currentFormat, currentMode);
  }
}

// ── Init: fetch live data, then render ──
(async function init() {
  document.querySelectorAll('.format-btn').forEach(b => b.classList.toggle('active', b.dataset.format === currentFormat));
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === currentMode));

  // Show loading state
  document.getElementById('cheatsheet').innerHTML = '<div style="color:rgba(255,255,255,0.3);text-align:center;padding:40px;font-size:14px">Loading from cache...</div>';

  await fetchCheatsheetData();
  await prefetchAllImages(); // Caches book logos + headshots + team logos as base64
  buildBookButtons();
  render(currentFormat, currentMode);
})();
</script>
</body>
</html>
